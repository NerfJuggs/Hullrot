            min: 2
            max: 4
      - !type:DoActsBehavior
        acts: ["Destruction"]
  - type: Tag
    tags:
    - Structure
  - type: Construction
    graph: Shelf
    node: ShelfMetal

- type: entity
  id: ShelfGlassCrescent
  parent: ShelfBaseCrescent
  name: glass shelf
  description: A fragile place to place, well, anything really.
  suffix: Crescent
  components:
  - type: Sprite
    sprite: Structures/Storage/Shelfs/glass.rsi
    state: base
  - type: Damageable
    damageModifierSet: Glass
    damageContainer: Inorganic
  - type: Destructible
    thresholds:
